[defaults]
# Default inventory file
inventory = inventory.ini

# Remote SSH user for Ubuntu AMI
remote_user = ubuntu

# Disable host key checking to prevent interactive prompts during automated runs
host_key_checking = False

# Enable timing information for tasks
callbacks_enabled = profile_tasks

# SSH private key path (update this with your actual key path if different)
private_key_file = ~/.ssh/id_rsa

[privilege_escalation]
# Enable sudo by default
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Optimize SSH connection speed
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=30m -o ConnectionAttempts=100 -o UserKnownHostsFile=/dev/null
