---
- name: Configure Web Server and Deploy TravelMemory App
  hosts: web
  become: yes
  vars:
    node_version: "18"
    app_dir: "/var/www/travelmemory"
    mongodb_app_user: "travel_user"
    mongodb_app_password: "TravelSecurePassword456"
    mongodb_app_db: "travelmemory"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - curl
          - git
          - nginx
          - build-essential
        state: present

    # Node.js Setup via NodeSource
    - name: Add NodeSource apt key
      shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | \
        gpg --dearmor --yes -o /usr/share/keyrings/nodesource.gpg
      args:
        creates: "/usr/share/keyrings/nodesource.gpg"

    - name: Add NodeSource repository
      apt_repository:
        filename: "nodesource"
        repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        state: present

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Verify Node.js installation
      command: node -v
      register: node_version_installed
      changed_when: false

    - name: Print Node.js version
      debug:
        msg: "Installed Node.js version is {{ node_version_installed.stdout }}"

    # Web Deployment directory setup
    - name: Ensure target directory exists and is owned by ubuntu
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Clone TravelMemory Git repository
      git:
        repo: 'https://github.com/UnpredictablePrashant/TravelMemory.git'
        dest: "{{ app_dir }}"
        version: main
        force: yes
      become: no # Clone as the ubuntu user

    # Backend Setup
    - name: Install backend dependencies
      npm:
        path: "{{ app_dir }}/backend"
        state: present
      become: no

    - name: Configure backend .env file
      template:
        src: backend_env.j2
        dest: "{{ app_dir }}/backend/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    # Frontend Setup
    - name: Install frontend dependencies
      npm:
        path: "{{ app_dir }}/frontend"
        state: present
      become: no

    - name: Configure frontend .env file
      template:
        src: frontend_env.j2
        dest: "{{ app_dir }}/frontend/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Build frontend React application
      command: npm run build
      args:
        chdir: "{{ app_dir }}/frontend"
      become: no

    # PM2 Node Process Manager Setup
    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes
        state: present

    - name: Start backend under PM2
      shell: |
        pm2 describe travelmemory-backend > /dev/null && pm2 restart travelmemory-backend || pm2 start index.js --name "travelmemory-backend"
      args:
        chdir: "{{ app_dir }}/backend"
      become: yes
      become_user: ubuntu

    - name: Save PM2 process list
      shell: pm2 save
      become: yes
      become_user: ubuntu

    # Nginx Configuration
    - name: Create Nginx configuration from template
      template:
        src: nginx_travelmemory.j2
        dest: /etc/nginx/sites-available/travelmemory
        owner: root
        group: root
        mode: '0644'

    - name: Enable TravelMemory Nginx site
      file:
        src: /etc/nginx/sites-available/travelmemory
        dest: /etc/nginx/sites-enabled/travelmemory
        state: link

    - name: Remove default Nginx site configuration
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart Nginx

    - name: Restart Nginx to apply configuration
      systemd:
        name: nginx
        state: restarted

  handlers:
    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted
